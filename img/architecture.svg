<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <title>mongodb-Core architecture</title>
  <rect width="900" height="480" fill="#f4f6f8"/>
  <text x="450" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#1e293b">XRK-AGT Layered Architecture</text>
  <text x="450" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#64748b">Runtime: Redis only | mongodb-Core: standalone repo</text>

  <rect x="40" y="76" width="820" height="72" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="56" y="100" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#334155">L0 Runtime (src/)</text>
  <text x="56" y="122" font-family="Arial,sans-serif" font-size="12" fill="#64748b">Loader, Config, LLM, Redis built-in</text>
  <rect x="56" y="130" width="88" height="22" rx="4" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="100" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#b91c1c">Redis</text>
  <text x="160" y="145" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">No MongoDB in Runtime</text>

  <rect x="40" y="168" width="820" height="120" rx="10" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="56" y="192" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#14532d">L1 mongodb-Core (core/mongodb-Core)</text>
  <rect x="56" y="204" width="130" height="36" rx="6" fill="#ffffff" stroke="#86efac"/>
  <text x="121" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#065f46">connect</text>
  <rect x="198" y="204" width="150" height="36" rx="6" fill="#ffffff" stroke="#86efac"/>
  <text x="273" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#065f46">registerCollection</text>
  <rect x="360" y="204" width="110" height="36" rx="6" fill="#ffffff" stroke="#86efac"/>
  <text x="415" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#065f46">Repository</text>
  <rect x="482" y="204" width="110" height="36" rx="6" fill="#ffffff" stroke="#86efac"/>
  <text x="537" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#065f46">migrations</text>
  <rect x="604" y="204" width="110" height="36" rx="6" fill="#ffffff" stroke="#86efac"/>
  <text x="659" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#065f46">indexes</text>
  <rect x="726" y="204" width="118" height="36" rx="6" fill="#ffffff" stroke="#86efac"/>
  <text x="785" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#065f46">Admin HTTP</text>
  <text x="56" y="268" font-family="Arial,sans-serif" font-size="11" fill="#64748b">Config: data/mongodb-core/config.yaml | pnpm add mongodb</text>

  <rect x="40" y="308" width="820" height="88" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="56" y="332" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#334155">L2 Business Core (lsy-Core, jm-Core, ...)</text>
  <text x="56" y="354" font-family="Arial,sans-serif" font-size="12" fill="#64748b">lib/store/*Repo.js imports mongodb-Core/lib only</text>
  <rect x="56" y="364" width="100" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="106" y="380" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#475569">lsy-Core</text>
  <rect x="168" y="364" width="100" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="218" y="380" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#475569">jm-Core</text>
  <text x="620" y="380" font-family="Arial,sans-serif" font-size="11" fill="#9a3412">Hot data / locks -&gt; Redis</text>

  <line x1="450" y1="148" x2="450" y2="168" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="450,168 446,160 454,160" fill="#64748b"/>
  <line x1="450" y1="288" x2="450" y2="308" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="450,308 446,300 454,300" fill="#64748b"/>
</svg>
